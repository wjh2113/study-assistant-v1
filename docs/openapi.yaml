  "components": {
    "securitySchemes": {
      "bearerAuth": {
        "type": "http",
        "scheme": "bearer",
        "bearerFormat": "JWT"
      }
    },
    "schemas": {
      "HealthResponse": {
        "type": "object",
        "properties": {
          "status": {"type": "string", "example": "ok"},
          "timestamp": {"type": "string", "format": "date-time"},
          "uptime": {"type": "number", "example": 3600},
          "services": {
            "type": "object",
            "properties": {
              "database": {"type": "string", "example": "connected"},
              "memory": {
                "type": "object",
                "properties": {
                  "used": {"type": "number", "example": 256},
                  "total": {"type": "number", "example": 512},
                  "unit": {"type": "string", "example": "MB"}
                }
              }
            }
          }
        }
      },
      "SendCodeRequest": {
        "type": "object",
        "required": ["phone"],
        "properties": {
          "phone": {"type": "string", "example": "13800138000"},
          "purpose": {"type": "string", "enum": ["login", "register"], "default": "login"}
        }
      },
      "LoginRequest": {
        "type": "object",
        "required": ["phone", "code"],
        "properties": {
          "phone": {"type": "string", "example": "13800138000"},
          "code": {"type": "string", "example": "123456"}
        }
      },
      "LoginResponse": {
        "type": "object",
        "properties": {
          "message": {"type": "string", "example": "登录成功"},
          "user": {"$ref": "#/components/schemas/User"},
          "token": {"type": "string"}
        }
      },
      "RegisterRequest": {
        "type": "object",
        "required": ["phone", "code"],
        "properties": {
          "phone": {"type": "string"},
          "code": {"type": "string"},
          "nickname": {"type": "string"},
          "grade": {"type": "integer"},
          "school_name": {"type": "string"},
          "real_name": {"type": "string"}
        }
      },
      "User": {
        "type": "object",
        "properties": {
          "id": {"type": "integer"},
          "role": {"type": "string", "enum": ["STUDENT", "TEACHER", "ADMIN"]},
          "phone": {"type": "string"},
          "nickname": {"type": "string"},
          "avatar_url": {"type": "string"},
          "profile": {"type": "object"}
        }
      },
      "UserResponse": {
        "type": "object",
        "properties": {
          "user": {"$ref": "#/components/schemas/User"}
        }
      },
      "UpdateUserRequest": {
        "type": "object",
        "properties": {
          "nickname": {"type": "string"},
          "avatar_url": {"type": "string"}
        }
      },
      "KnowledgeRequest": {
        "type": "object",
        "properties": {
          "name": {"type": "string"},
          "subject": {"type": "string"},
          "grade": {"type": "integer"},
          "description": {"type": "string"},
          "parent_id": {"type": "integer", "nullable": true}
        }
      },
      "ProgressUpsertRequest": {
        "type": "object",
        "properties": {
          "knowledge_point_id": {"type": "integer"},
          "mastery": {"type": "number", "minimum": 0, "maximum": 1},
          "last_reviewed_at": {"type": "string", "format": "date-time"}
        }
      },
      "StudyLogRequest": {
        "type": "object",
        "properties": {
          "subject": {"type": "string"},
          "duration": {"type": "integer", "description": "学习时长 (分钟)"},
          "description": {"type": "string"}
        }
      },
      "AskRequest": {
        "type": "object",
        "required": ["question"],
        "properties": {
          "question": {"type": "string"},
          "context": {
            "type": "object",
            "properties": {
              "subject": {"type": "string"},
              "grade": {"type": "integer"}
            }
          }
        }
      },
      "GenerateQuestionsRequest": {
        "type": "object",
        "properties": {
          "knowledge_point_id": {"type": "integer"},
          "question_type": {"type": "string", "enum": ["choice", "fill", "calculation"]},
          "difficulty": {"type": "string", "enum": ["easy", "medium", "hard"]},
          "count": {"type": "integer", "minimum": 1, "maximum": 20}
        }
      },
      "GeneratePlanRequest": {
        "type": "object",
        "properties": {
          "subject": {"type": "string"},
          "timeframe": {
            "type": "object",
            "properties": {
              "total_days": {"type": "integer"},
              "start_date": {"type": "string", "format": "date"},
              "end_date": {"type": "string", "format": "date"}
            }
          },
          "goals": {
            "type": "array",
            "items": {
              "type": "object",
              "properties": {
                "knowledge_point_id": {"type": "integer"},
                "current_mastery": {"type": "number"},
                "target_mastery": {"type": "number"},
                "priority": {"type": "string", "enum": ["low", "medium", "high"]}
              }
            }
          },
          "preferences": {
            "type": "object",
            "properties": {
              "daily_time_limit": {"type": "integer"},
              "include_weekend": {"type": "boolean"},
              "learning_style": {"type": "string"}
            }
          }
        }
      },
      "TextbookUploadRequest": {
        "type": "object",
        "properties": {
          "file": {"type": "string", "format": "binary"},
          "title": {"type": "string"},
          "subject": {"type": "string"},
          "grade": {"type": "string"},
          "version": {"type": "string"}
        }
      },
      "AvatarUploadRequest": {
        "type": "object",
        "properties": {
          "file": {"type": "string", "format": "binary"},
          "userId": {"type": "string"}
        }
      },
      "CreateSessionRequest": {
        "type": "object",
        "properties": {
          "subject": {"type": "string"},
          "knowledge_point_ids": {"type": "array", "items": {"type": "integer"}},
          "question_count": {"type": "integer"},
          "difficulty": {"type": "string", "enum": ["easy", "medium", "hard"]},
          "time_limit": {"type": "integer"}
        }
      },
      "SubmitAnswerRequest": {
        "type": "object",
        "required": ["question_id", "answer"],
        "properties": {
          "question_id": {"type": "integer"},
          "answer": {"type": "string"},
          "time_spent": {"type": "integer"}
        }
      }
    }
  }
