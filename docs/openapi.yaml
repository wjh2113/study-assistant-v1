{
  "openapi": "3.0.3",
  "info": {
    "title": "StudyAss 学习助手 API",
    "description": "StudyAss AI 学习平台 - RESTful API 接口文档",
    "version": "1.0.0",
    "contact": {
      "name": "俊哥的学习助手团队"
    }
  },
  "servers": [
    {
      "url": "http://localhost:3000/api",
      "description": "本地开发环境"
    },
    {
      "url": "https://api.studyass.com/api",
      "description": "生产环境"
    }
  ],
  "tags": [
    {
      "name": "健康检查",
      "description": "系统健康状态检查"
    },
    {
      "name": "用户认证",
      "description": "用户注册、登录、Token 管理"
    },
    {
      "name": "知识点管理",
      "description": "知识点的增删改查"
    },
    {
      "name": "学习进度",
      "description": "学习进度跟踪和统计"
    },
    {
      "name": "AI 问答",
      "description": "AI 答疑和问答历史"
    },
    {
      "name": "AI 出题",
      "description": "AI 智能出题功能"
    },
    {
      "name": "AI Gateway V2",
      "description": "多 AI 服务路由"
    },
    {
      "name": "AI 学习规划",
      "description": "个性化学习计划生成和管理"
    },
    {
      "name": "课本解析",
      "description": "PDF 课本上传和解析"
    },
    {
      "name": "薄弱点分析",
      "description": "知识点掌握度分析和推荐"
    },
    {
      "name": "积分系统",
      "description": "积分获取、打卡、记录"
    },
    {
      "name": "排行榜",
      "description": "用户排名和榜单"
    },
    {
      "name": "文件上传",
      "description": "课本、头像、附件上传"
    },
    {
      "name": "练习会话",
      "description": "练习会话管理和答题"
    }
  ],
  "paths": {
    "/health": {
      "get": {
        "tags": ["健康检查"],
        "summary": "健康检查",
        "operationId": "getHealth",
        "security": [],
        "responses": {
          "200": {
            "description": "健康状态正常",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/HealthResponse"
                }
              }
            }
          }
        }
      }
    },
    "/auth/send-code": {
      "post": {
        "tags": ["用户认证"],
        "summary": "发送验证码",
        "operationId": "sendCode",
        "security": [],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/SendCodeRequest"
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "验证码已发送"
          },
          "400": {
            "description": "请求参数错误"
          },
          "429": {
            "description": "发送过于频繁"
          }
        }
      }
    },
    "/auth/login": {
      "post": {
        "tags": ["用户认证"],
        "summary": "用户登录",
        "operationId": "login",
        "security": [],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/LoginRequest"
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "登录成功",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/LoginResponse"
                }
              }
            }
          },
          "401": {
            "description": "验证码错误"
          }
        }
      }
    },
    "/auth/register": {
      "post": {
        "tags": ["用户认证"],
        "summary": "用户注册",
        "operationId": "register",
        "security": [],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/RegisterRequest"
              }
            }
          }
        },
        "responses": {
          "201": {
            "description": "注册成功"
          }
        }
      }
    },
    "/auth/refresh": {
      "post": {
        "tags": ["用户认证"],
        "summary": "刷新 Token",
        "operationId": "refreshToken",
        "security": [{"bearerAuth": []}],
