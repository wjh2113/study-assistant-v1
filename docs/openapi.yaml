          {
            "name": "pageSize",
            "in": "query",
            "schema": {"type": "integer", "default": 20}
          },
          {
            "name": "subject",
            "in": "query",
            "schema": {"type": "string"}
          },
          {
            "name": "grade",
            "in": "query",
            "schema": {"type": "integer"}
          }
        ],
        "responses": {
          "200": {
            "description": "知识点列表"
          }
        }
      },
      "post": {
        "tags": ["知识点管理"],
        "summary": "创建知识点",
        "operationId": "createKnowledge",
        "security": [{"bearerAuth": []}],
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/KnowledgeRequest"
              }
            }
          }
        },
        "responses": {
          "201": {
            "description": "创建成功"
          }
        }
      }
    },
    "/knowledge/search": {
      "get": {
        "tags": ["知识点管理"],
        "summary": "搜索知识点",
        "operationId": "searchKnowledge",
        "security": [{"bearerAuth": []}],
        "parameters": [
          {
            "name": "keyword",
            "in": "query",
            "required": true,
            "schema": {"type": "string"}
          }
        ],
        "responses": {
          "200": {
            "description": "搜索结果"
          }
        }
      }
    },
    "/knowledge/{id}": {
      "get": {
        "tags": ["知识点管理"],
        "summary": "获取单个知识点",
        "operationId": "getKnowledge",
        "security": [{"bearerAuth": []}],
        "parameters": [
          {
            "name": "id",
            "in": "path",
            "required": true,
            "schema": {"type": "integer"}
          }
        ],
        "responses": {
          "200": {
            "description": "知识点详情"
          }
        }
      },
      "put": {
        "tags": ["知识点管理"],
        "summary": "更新知识点",
        "operationId": "updateKnowledge",
        "security": [{"bearerAuth": []}],
        "parameters": [
          {
            "name": "id",
            "in": "path",
            "required": true,
            "schema": {"type": "integer"}
          }
        ],
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/KnowledgeRequest"
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "更新成功"
          }
        }
      },
      "delete": {
        "tags": ["知识点管理"],
        "summary": "删除知识点",
        "operationId": "deleteKnowledge",
        "security": [{"bearerAuth": []}],
        "parameters": [
          {
            "name": "id",
            "in": "path",
            "required": true,
            "schema": {"type": "integer"}
          }
        ],
        "responses": {
          "200": {
            "description": "删除成功"
          }
        }
      }
    },
