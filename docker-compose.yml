version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: studyass-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: studyass
      POSTGRES_PASSWORD: studyass_password
      POSTGRES_DB: studyass_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studyass -d studyass_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存（用于验证码存储、排行榜缓存、队列）
  redis:
    image: redis:7-alpine
    container_name: studyass-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: studyass-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "9090:9090"
    environment:
      - PORT=3000
      - PROMETHEUS_PORT=9090
      - PROMETHEUS_PATH=/metrics
      - DATABASE_URL=postgresql://studyass:studyass_password@postgres:5432/studyass_db?schema=public
      - JWT_SECRET=D8EnCR3xkPoSfUFyNArLOpi7K5VbQ4WmadvgjZ02HTX6uqlYczh1w9tGBIsJeM
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AI_API_KEY=${AI_API_KEY}
      - AI_API_URL=${AI_API_URL}
      # 本地文件存储配置（替代 OSS/FTP）
      - UPLOAD_DIR=/app/uploads
      - MAX_FILE_SIZE=52428800
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
      - /app/node_modules

  # Prometheus 监控
  prometheus:
    image: prom/prometheus:latest
    container_name: studyass-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./backend/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./backend/monitoring/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    depends_on:
      - backend

  # Grafana 可视化
  grafana:
    image: grafana/grafana:latest
    container_name: studyass-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
    volumes:
      - grafana_data:/var/lib/grafana
      - ./backend/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./backend/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus

  # Alertmanager 告警管理
  alertmanager:
    image: prom/alertmanager:latest
    container_name: studyass-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./backend/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:
