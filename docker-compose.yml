version: '3.8'

services:
  # ============================================
  # Nginx 反向代理
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: study-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - api
    networks:
      - study-network
    restart: always

  # ============================================
  # NestJS API 服务
  # ============================================
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: study-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://study_user:study_pass@postgres:5432/study_assistant?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-production}
      - JWT_EXPIRES_IN=7d
      - FTP_HOST=vsftpd
      - FTP_PORT=21
      - FTP_USER=study_upload
      - FTP_PASSWORD=${FTP_PASSWORD:-ftp_password}
      - FTP_BASE_URL=http://localhost:2121
      - UPLOAD_MAX_SIZE=10485760
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - study-network
    restart: always

  # ============================================
  # Worker 服务（队列处理）
  # ============================================
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: study-worker
    command: npm run start:worker
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://study_user:study_pass@postgres:5432/study_assistant?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CONCURRENCY=5
    depends_on:
      - api
      - redis
    networks:
      - study-network
    restart: always

  # ============================================
  # PostgreSQL 16 数据库
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: study-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=study_assistant
      - POSTGRES_USER=study_user
      - POSTGRES_PASSWORD=study_pass
      - TZ=Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U study_user -d study_assistant"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - study-network
    restart: always

  # ============================================
  # Redis 7 缓存和队列
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: study-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass study_redis_pass
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "study_redis_pass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - study-network
    restart: always

  # ============================================
  # vsftpd FTP 服务器
  # ============================================
  vsftpd:
    image: fauria/vsftpd:latest
    container_name: study-ftp
    ports:
      - "21:21"
      - "21100-21110:21100-21110"
      - "2121:2121"
    environment:
      - FTP_USER_1=study_upload,study_ftp_pass
      - FTP_USER_2=study_download,study_ftp_pass
      - PASV_ADDRESS=localhost
      - PASV_MIN_PORT=21100
      - PASV_MAX_PORT=21110
      - PASV_ENABLE=YES
      - ANONYMOUS_ENABLE=NO
      - WRITE_ENABLE=YES
      - LOCAL_ENABLE=YES
    volumes:
      - ftp_data:/home/vsftpd
      - ./ftp/logs:/var/log/vsftpd
    networks:
      - study-network
    restart: always

networks:
  study-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ftp_data:
    driver: local
